<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCV DRS System</title>
    <style>
        :root {
            --primary: #2563eb;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        h1 {
            margin-top: 0;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .controls {
            display: grid;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        select, input[type="file"], button {
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--background);
            color: var(--text);
            font-size: 1rem;
        }
        button {
            background: var(--primary);
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .results {
            display: none;
            margin-top: 2rem;
            border-top: 1px solid var(--border);
            padding-top: 2rem;
        }
        .results.active {
            display: block;
        }
        .media-container {
            display: grid;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        video, img {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            text-align: center;
            margin-top: 1rem;
        }
        .stat-box {
            background: var(--background);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .stat-label {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 1.25rem;
            font-weight: bold;
        }
        #loading {
            display: none;
            text-align: center;
            margin: 2rem 0;
        }
        .spinner {
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DRS Ball Tracking</h1>
        
        <form id="drsForm" class="controls">
            <div>
                <label>Ball Color</label>
                <select name="color">
                    <option value="red">Red (Test Match)</option>
                    <option value="white">White (Limited Overs)</option>
                </select>
            </div>
            
            <div>
                <label>Action</label>
                <select name="action" id="actionSelect">
                    <option value="synthetic_hitting">Generate Synthetic: Hitting</option>
                    <option value="synthetic_missing">Generate Synthetic: Missing</option>
                    <option value="synthetic_umpires_call">Generate Synthetic: Umpire's Call</option>
                    <option value="upload">Upload Custom Video</option>
                </select>
            </div>
            
            <div id="fileUpload" style="display: none;">
                <label>Video File (.mp4)</label>
                <input type="file" name="video" accept="video/mp4">
            </div>
            
            <button type="submit" id="submitBtn">Process Delivery</button>
        </form>

        <div id="loading">
            <div class="spinner"></div>
            <p>Processing frames and calculating trajectory...</p>
        </div>

        <div id="results" class="results">
            <h2 style="text-align: center; margin-bottom: 1.5rem;">Decision: <span id="finalCall"></span></h2>
            
            <div class="media-container">
                <div>
                    <h3 style="margin-top:0">Tracking Video</h3>
                    <video id="resultVideo" controls autoplay loop></video>
                </div>
                <div>
                    <h3 style="margin-top:0">Hawk-Eye Graphic</h3>
                    <img id="resultImage" alt="DRS Decision Graphic">
                </div>
            </div>
            
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Pitching</div>
                    <div class="stat-value" id="statPitching">-</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Impact</div>
                    <div class="stat-value" id="statImpact">-</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Wickets</div>
                    <div class="stat-value" id="statWickets">-</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const actionSelect = document.getElementById('actionSelect');
        const fileUpload = document.getElementById('fileUpload');
        const form = document.getElementById('drsForm');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const submitBtn = document.getElementById('submitBtn');

        actionSelect.addEventListener('change', (e) => {
            fileUpload.style.display = e.target.value === 'upload' ? 'block' : 'none';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            loading.style.display = 'block';
            results.classList.remove('active');
            
            const formData = new FormData(form);
            
            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error || 'Processing failed');
                
                document.getElementById('resultVideo').src = `/outputs/${data.job_id}/tracked_output.mp4`;
                document.getElementById('resultImage').src = `/outputs/${data.job_id}/drs_decision.png`;
                
                document.getElementById('statPitching').textContent = data.pitching_zone.replace('_', ' ');
                document.getElementById('statImpact').textContent = data.impact_zone.replace('_', ' ');
                document.getElementById('statWickets').textContent = data.wicket_verdict.replace('_', ' ');
                
                const callEl = document.getElementById('finalCall');
                callEl.textContent = data.final_call;
                callEl.style.color = data.final_call === 'OUT' ? '#ef4444' : 
                                   data.final_call === 'NOT OUT' ? '#22c55e' : '#eab308';
                
                results.classList.add('active');
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
